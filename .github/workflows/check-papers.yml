name: Check new papers

on:
  schedule:
    - cron: '0 8 * * *'  # 11:00 MSK
  workflow_dispatch:

jobs:
  check-papers:
    runs-on: ubuntu-latest

    env:
      SRG_ARTXC_PAPER_BOT_TOKEN: ${{ secrets.SRG_ARTXC_PAPER_BOT_TOKEN }}
      ADSABS_TOKEN: ${{ secrets.ADSABS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        run: |
          install.packages("pak")
          pak::pkg_install(c(
            "aRxiv", "tidyverse", "rvest", "progress",
            "telegram.bot", "httr", "logger",
            "checkmate", "here", "Rapp"
          ))
        shell: Rscript {0}

      - name: Check ART-XC papers
        run: Rscript -e 'Rapp::run("check-papers.R", "artxc")'

      - name: Check eROSITA papers
        run: Rscript -e 'Rapp::run("check-papers.R", "erosita")'

      - name: Save state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f papers_in_telegram.Rds papers_in_telegram_ero_ru.Rds 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update paper tracking files"
          git push
